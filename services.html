<!DOCTYPE html>

<body>

    <dialog>

    <script type = text/javascript>
        var dialog = document.querySelector('dialog');
        let product = (document.querySelectorAll('#show'));
        product.forEach((item) => { item.onclick = function(){
            dialog.showModal();
        }})
        document.querySelector('#close').onclick = function() {
        dialog.close();
        };
    </script>
